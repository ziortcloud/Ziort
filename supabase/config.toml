# ZiOrbit — Supabase project config
# Project ref: jzkkxsvzunarysvurmtd
# Dashboard: https://supabase.com/dashboard/project/jzkkxsvzunarysvurmtd
# https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://ziorbit.com", "https://ziorbit.in"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # set true in production
