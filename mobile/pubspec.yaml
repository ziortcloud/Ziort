name: ziorbit_mobile
description: ZiOrbit — Business OS for Indian SMBs. Mobile app for all 19 products.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase — auth + realtime
  supabase_flutter: ^2.5.0

  # HTTP — REST calls to Next.js API (same /api/v1/* routes)
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.4.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  intl: ^0.19.0

  # Forms & validation
  reactive_forms: ^17.0.1

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
